name = "dokimos"
main = "worker/index.js"
compatibility_date = "2026-07-04"

[assets]
directory = "./"
binding = "ASSETS"
not_found_handling = "404-page"
# Without this, Cloudflare serves any request matching a real static file
# (e.g. /news/ -> news/index.html) directly, without ever invoking the
# Worker's fetch() handler below -- which is how /api/contact worked from
# the start (no static file matches that path) but /news silently never
# reached handleNewsPage until this was added.
run_worker_first = true

[vars]
# Resend's unverified onboarding@resend.dev sender can only deliver to the
# Resend account's own email until a domain is verified (resend.com/domains).
# Switch this to info.charis.systems@gmail.com once that's done.
CONTACT_RECIPIENT = "alemiherbert@gmail.com"

[[d1_databases]]
binding = "DB"
database_name = "dokimos-db"
database_id = "7700d105-2f39-4f06-83b4-cafb434e73b1"
migrations_dir = "migrations"

[[ratelimits]]
name = "CONTACT_RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 5, period = 60 }
